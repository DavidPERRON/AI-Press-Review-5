name: Cloud Dry Run

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: Run date in YYYY-MM-DD format
        required: false
        default: ''
      profile:
        description: Editorial profile (daily, weekly_recap)
        required: false
        default: 'daily'
      render_audio:
        description: Render TTS audio (disable to isolate collect/editorial)
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_tests:
        description: Skip pytest step (useful when debugging a run)
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  cloud_dry_run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: pytest tests/ -v --tb=short

      - name: Install Chromium for crawler
        run: python -m playwright install chromium

      - name: Run cloud dry run
        env:
          PODCAST_DESCRIPTION_LONG: ${{ vars.PODCAST_DESCRIPTION_LONG }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_EDITOR_MODEL: ${{ vars.LLM_EDITOR_MODEL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          CARTESIA_VOICE_ID: ${{ vars.CARTESIA_VOICE_ID }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        run: |
          set -e
          RUN_DATE="${{ github.event.inputs.run_date }}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date +%F); fi
          PROFILE="${{ github.event.inputs.profile }}"
          if [ -z "$PROFILE" ]; then PROFILE="daily"; fi
          RENDER_FLAG="--render-audio"
          if [ "${{ github.event.inputs.render_audio }}" = "false" ]; then
            RENDER_FLAG="--no-render-audio"
          fi
          echo "Run parameters: date=$RUN_DATE profile=$PROFILE render=$RENDER_FLAG"
          python scripts/cloud_dry_run.py --date "$RUN_DATE" --profile "$PROFILE" $RENDER_FLAG

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cloud-dry-run-output
          path: |
            output/
            data/sources/
          retention-days: 7
          if-no-files-found: warn
