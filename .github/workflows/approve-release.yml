name: Approve & Release Now

# Declenchement manuel pour publier le draft immediatement
# (sans attendre l'auto-release de 10h)

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale to release (en or fr)'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr

permissions:
  contents: write

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -e
          pip install -r requirements.txt
          pip install -e .

      - name: Pull latest state
        run: git pull --rebase origin main

      - name: Release pending draft
        env:
          APR_LOCALE: ${{ inputs.locale }}
          PUBLIC_AUDIO_BASE_URL: ${{ vars.PUBLIC_AUDIO_BASE_URL }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: python scripts/release_draft.py

      - name: Commit published state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/ docs/
          git diff --cached --quiet || git commit -m "release: manually approved episode [skip ci]"
          git push

      # Push the freshly-published URLs to IndexNow (Bing + Yandex + federated
      # engines). GitHub Pages needs ~30-90s to redeploy after the push above,
      # so we wait before submitting — IndexNow drops URLs that 404 at submit
      # time. Non-blocking: IndexNow failures must not fail the release job.
      - name: Wait for GitHub Pages deploy
        run: sleep 90

      - name: Notify IndexNow (Bing/Yandex)
        continue-on-error: true
        run: python seo/tools/submit_indexnow.py --all
