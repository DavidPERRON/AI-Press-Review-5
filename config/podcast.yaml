# ──────────────────────────────────────────────────────────────
#  AI PRESS REVIEW — CONFIGURATION CENTRALE
#  Modifie ce fichier directement sur GitHub pour ajuster les parametres.
#  Les changements prennent effet au prochain run du workflow.
# ──────────────────────────────────────────────────────────────

# ── PODCAST METADATA ──────────────────────────────────────────
title: "AI Press Review"
subtitle: "Factual, Clear, Built for Busy Professionals"
author: "David Perron"
email: "david.perron@aequitus.net"
author_email: "david.perron@aequitus.net"
language: "en"
# Phase 5 / B1: content is ~90% technology, Business was a discoverability mismatch
category_primary: "Technology"
category_secondary: "Artificial Intelligence"
tagline: "40 sources. 15 minutes. What matters in AI today."
short_description: "40 sources. 15 minutes. What matters in AI today."
long_description: >
  Every weekday morning at 7AM CET, AI Press Review distills 40+ global sources
  into a focused 15-minute briefing — filtered, weighted, and structured around
  six pillars: AI News, Research & Breakthroughs, Use Cases, Tools & Practice,
  Weak Signals, and Education. Built for professionals who need signal, not noise.
  Every Saturday: a weekly recap of the five trends that defined the week.
feed_url: "https://podcast.aequitus.net/podcast-feed.xml"
site_url: "https://podcast.aequitus.net"
# Phase 5 / B3: move audio CDN under podcast.aequitus.net (unified branding).
# ⚠️  REQUIRES DNS SETUP: CNAME podcast.aequitus.net → <r2-custom-domain> BEFORE production publish.
# Ashcroftedition stays visible in the spoken closing (sponsorship narrative).
public_audio_base_url: "https://podcast.aequitus.net"
cover_image: "assets/podcast-cover.png"

# ── EDITORIAL (defaults — les profils peuvent surcharger) ────
editorial:
  target_duration_min: 14
  target_duration_max: 18
  min_script_words: 2000
  # Phase 5 / E5: aligned with "40 sources" tagline (was 15 — contradicted brand promise)
  min_source_count: 40
  freshness_hours: 48
  exclude_previous_episode: true
  # Phase 5 / B4: spoken closing moved from hardcoded validate.py to config.
  # Reframes as sponsorship — buying the book funds production (not a plain plug).
  closing_sentence: "This podcast is sponsored by my novel, The Last Heaven — every copy bought on Amazon or at ashcroftedition.com pays for a week of production. Thank you."

# ── LLM ───────────────────────────────────────────────────────
llm:
  max_tokens: 12000
  temperature: 0.2
  # Phase 8 / P3: bumped 180 → 240 to accommodate Gemini 2.5 Pro as primary.
  # Bench data: Pro averages 146s per attempt (vs Flash 38s), 3 attempts × 146s
  # fits comfortably in 240s per-call budget; pipeline p95 still < 10 min.
  timeout_seconds: 240

# ── TTS (Cartesia) ───────────────────────────────────────────
tts:
  chunk_max_chars: 1500
  speed: 1.0
  volume: 1.0
  # Phase 5 / T1: news-TV delivery tone (was "confident" / calmer). Phase 7 will validate.
  emotion: "serious"
  # Phase 5 / T4: voice-only podcast sweet spot — 96k saves ~25% storage/bandwidth vs 128k
  bitrate: "96k"

# ── PUBLICATION ───────────────────────────────────────────────
retention_days: 10
publish_timezone: "Europe/Paris"

schedule:
  publish_hour_local: 7
  weekdays_only: false

# ──────────────────────────────────────────────────────────────
#  PROFILS EDITORIAUX
#  Chaque profil surcharge les parametres editorial ci-dessus.
#  Pour creer un nouveau workflow : ajoutez un profil ici,
#  creez le prompt correspondant dans config/, et ajoutez
#  un workflow dans .github/workflows/.
# ──────────────────────────────────────────────────────────────
profiles:
  daily:
    description: "Episode quotidien Lun-Ven"
    freshness_hours: 48
    exclude_previous_episode: true
    prefer_unused: false
    # Phase 5 / E5: aligned with "40 sources" tagline
    min_source_count: 40
    min_script_words: 2000
    target_duration_min: 14
    target_duration_max: 18
    prompt_file: "prompt_system.txt"
    intro_format: "daily"

  weekly_recap:
    description: "Recap hebdomadaire — Samedi"
    freshness_hours: 168
    exclude_previous_episode: false
    prefer_unused: true
    unused_score_bonus: 2.0
    reuse_min_score: 8.0
    min_source_count: 45
    # Phase 5 / E8: target 20 min (was 18-24 min window). Raises word floor for denser recap.
    min_script_words: 2600
    target_duration_min: 19
    target_duration_max: 22
    prompt_file: "prompt_weekly.txt"
    intro_format: "weekly"

# ── SCORING DES SOURCES ──────────────────────────────────────
# Le score determine quelles sources sont selectionnees.
# Plus le score est eleve, plus la source est prioritaire.

scoring:
  min_relevance: 3.0
  min_text_length: 180
  similarity_threshold: 0.88
  max_per_domain: 7

  # Phase 5 / E6: banned_terms cleared — the list was over-blocking legit enterprise AI
  # coverage (EU AI Act, compliance tooling, regulatory deployments) and creating false
  # negatives. Scoring + domain_authority handle quality adequately without a blacklist.
  banned_terms: []

  # Termes AI — poids fort (score +3.0 par match)
  ai_terms_high:
    - "artificial intelligence"
    - "generative ai"
    - "large language model"
    - "foundation model"
    - "text to speech"
    - "voice model"

  # Termes AI — poids moyen (score +1.5 par match)
  ai_terms_mid:
    - "ai"
    - "llm"
    - "agent"
    - "inference"
    - "copilot"
    - "benchmark"
    - "gpu"
    - "datacenter"
    - "data center"

  # Termes AI — poids faible (score +0.5 par match)
  ai_terms_low:
    - "model"
    - "chip"
    - "research"
    - "deployment"
    - "automation"

  # Mots-signaux forts (score +1.0 par match, max 4.0)
  signal_words_strong:
    - "benchmark"
    - "launch"
    - "funding"
    - "deploy"
    - "revenue"
    - "inference"
    - "training"
    - "open source"
    - "api"
    - "fine-tune"
    - "architecture"
    - "parameter"
    - "token"
    - "multimodal"

  # Mots-signaux moyens (score +0.5 par match, max 2.0)
  signal_words_medium:
    - "latency"
    - "chip"
    - "model"
    - "agent"
    - "research"
    - "paper"
    - "deployment"
    - "startup"
    - "enterprise"
    - "scale"

  # Autorite des domaines — bonus automatique par source
  # Phase 5 / E7: CORPORATES CAPPED AT 1.0 to avoid over-mentioning.
  # Only independent academic publishers keep the 1.5 bonus (arxiv, science.org).
  # Research arms of corporations (research.google, apple ML) are treated as corporate.
  domain_authority:
    # Independent academic research — highest weight (peer-reviewed / open publication)
    "arxiv.org": 1.5
    "science.org": 1.5
    # Corporate labs (capped at 1.0 per E7 — product blogs and corporate research arms)
    "openai.com": 1.0
    "blog.google": 1.0
    "research.google": 1.0
    "nvidia.com": 1.0
    "huggingface.co": 1.0
    "machinelearning.apple.com": 1.0
    "intel.com": 1.0
    # Third-party press — tech
    "techcrunch.com": 1.0
    "venturebeat.com": 1.0
    "technologyreview.com": 1.0
    "ft.com": 1.0
    "economist.com": 1.0
    "theverge.com": 0.8
    # Finance-specific
    "finextra.com": 0.8
    "americanbanker.com": 0.8
    "pymnts.com": 0.5
