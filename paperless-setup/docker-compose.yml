# =============================================================================
# Paperless-ngx stack — browsable index of your organized documents.
# Optional companion to mac-organizer: lets you search full-text across
# every PDF with tags/correspondents/doctypes.
#
# Data lives in ./data/* (bind-mounted, on the SSD if you set PAPERLESS_DATA_ROOT).
# =============================================================================

services:
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - ${PAPERLESS_DATA_ROOT:-./data}/redis:/data

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DB_PASSWORD:-paperless}
    volumes:
      - ${PAPERLESS_DATA_ROOT:-./data}/pgdata:/var/lib/postgresql/data

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: docker.io/apache/tika:latest
    restart: unless-stopped

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - "8000:8000"
    volumes:
      - ${PAPERLESS_DATA_ROOT:-./data}/data:/usr/src/paperless/data
      - ${PAPERLESS_DATA_ROOT:-./data}/media:/usr/src/paperless/media
      - ${PAPERLESS_DATA_ROOT:-./data}/export:/usr/src/paperless/export
      - ${PAPERLESS_CONSUME_DIR:-./consume}:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASSWORD:-paperless}
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE:-fra+eng}
      PAPERLESS_TIME_ZONE: ${PAPERLESS_TIME_ZONE:-Europe/Paris}
      PAPERLESS_URL: ${PAPERLESS_URL:-http://localhost:8000}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-changeme}
      PAPERLESS_CONSUMER_POLLING: 5
      PAPERLESS_CONSUMER_RECURSIVE: 1
      PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: 1
      PAPERLESS_FILENAME_FORMAT: "{correspondent}/{created_year}/{title}"
